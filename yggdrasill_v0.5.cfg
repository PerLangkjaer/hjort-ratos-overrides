######################################################################
#  yggdrasill.cfg  –  RatOS add-on
#
#  Includes:
#    • RatOS and machine-level macros
#    • Global slicer compatibility override
#    • Per-tool macros (T0 / optional T1) for filament-sensor behaviour
#    • Toolhead filament sensors and button for T0
#    • Chamber/case light (PWM controlled)
#    • Chamber filter fan, temperature sensor and heater
#    • Placeholders for skew-correction and exclude-object
######################################################################

######################################################################
# RatOS Machine Macros – Chamber heater specific stuff
######################################################################
[gcode_macro RatOS]
variable_chamber_heater_enable: True                      # Enable/disable chamber heater control
variable_chamber_heater_bed_temp: 110                     # Bed temperature during chamber preheating (°C)
variable_chamber_heater_preheating_temp: 75               # Generic heater temperature for chamber preheating (°C)
variable_chamber_heater_heating_temp_offset: 25           # Temperature offset for generic heater while printing (°C)
variable_chamber_heater_control_external_heater: False    # Enable automatic control for external heater devices
variable_chamber_heater_air_circulation_enable: True      # Use part cooling for air circulation during preheating
variable_chamber_heater_air_circulation_fan_speed: 0.35   # Part cooling fan speed for air circulation (0.0-1.0)
variable_chamber_heater_air_circulation_y_pos: 0          # Toolhead Y-position for air circulation
variable_chamber_heater_air_circulation_z_pos: 100        # Toolhead Z-position for air circulation
variable_chamber_heater_extra_fan_speed: 1.0              # Extra chamber heater fan speed (0.0-1.0)
variable_chamber_heater_filter_fan_speed: 1.0             # Filter fan speed for air circulation (0.0-1.0)
variable_beacon_adaptive_heat_soak: True                  # Can be set to false to disable Adaptive Heat Soak
variable_beacon_adaptive_heat_soak_layer_quality: 4
variable_beacon_adaptive_heat_soak_maximum_first_layer_duration: 1800
variable_beacon_adaptive_heat_soak_max_wait: 5400
variable_hotend_heat_soak_time: 60


[stepper_z]
position_max: 1001

[heater_bed]
heater_pin: PF9

######################################################################
# RatOS General Settings
######################################################################
[ratos]
allow_unsupported_slicer_versions: True                   # Accept slicer versions not “officially” recognised by RatOS


######################################################################
# Tool 0 (T0) – filament-sensor behaviour flags
######################################################################
[gcode_macro T0]
variable_enable_insert_detection: False                   # Ignore filament INSERT events
variable_enable_runout_detection:  True                   # Enable detection of filament RUNOUT
variable_enable_clog_detection:    False                  # Ignore filament CLOG events (enable if stable)
variable_unload_after_runout:      False                  # Do not auto-unload when runout happens


######################################################################
# Filament Switch Sensor – runout/insert detection near nozzle
######################################################################

[filament_switch_sensor bowden_filament_sensor_t0]
pause_on_runout: true
switch_pin: ^PC15 # Replace with the pin you are using
runout_gcode:
   _ON_BOWDEN_FILAMENT_SENSOR_RUNOUT TOOLHEAD=0
    RESPOND MSG="Filament runout triggered"
    #SET_IDLE_TIMEOUT TIMEOUT=86400
insert_gcode:
    _ON_BOWDEN_FILAMENT_SENSOR_INSERT TOOLHEAD=0
    RESPOND MSG="Triggered feeding"
event_delay: 2.0
pause_delay: 2.0
#debounce_delay:2.0
    
[filament_motion_sensor bowden_filament_clog_t0]
switch_pin: ^PF1
detection_length: 41
extruder: extruder     # Use 'extruder1' if you set this up for T1
pause_on_runout: True
event_delay: 3.0
pause_delay: 0.5
runout_gcode:
    _ON_BOWDEN_FILAMENT_SENSOR_CLOG TOOLHEAD=0
insert_gcode:
    # Place any relevant G-code here if you want to handle "unclog" events
    # E.g.: _ON_BOWDEN_FILAMENT_SENSOR_UNCLOG TOOLHEAD=0

[gcode_button Trigger Feeding]
pin:^!PF3 # Replace with the pin you are using, connected to the feed pin
press_gcode:
    RESPOND MSG="Triggered feeding"
    # Custom Gcode

[gcode_button Trigger Retraction]
pin:^!PF4 # Replace with the pin you are using, connected to the retraction pin
press_gcode:
    RESPOND MSG="Triggered retraction"
    # Custom Gcode

######################################################################
# Chamber / Case Lighting – FAN0 header (PB11)
######################################################################
[output_pin caselight]
pin: PA6                                                # MOSFET output pin to LED driver
pwm: True                                                # Enable PWM brightness control
shutdown_value: 0                                        # Light OFF on shutdown/error
value: 1                                               # Startup brightness (0.0–1.0)
cycle_time: 0.0025                                       # Fast PWM cycle for smooth dimming


######################################################################
# Chamber Filter Fan – enclosure airflow/filtration Connected to FAN6
######################################################################
[fan_generic filter]
#enable_pin: PD15                                         # Power enable gate for fan
pin: PA2                                                # PWM fan control (inverted polarity)
cycle_time: 0.02                                       # Optional PWM tuning
kick_start_time: 0.5                                   # Helps heavy fans spin up
max_power: 1.0                                         # Power limit if needed (0.0–1.0)


######################################################################
# Chamber Temperature Sensor – passive temperature monitoring Connected to TH3
######################################################################
[temperature_sensor chamber]
sensor_type: ATC Semitec 104GT-2                         # 100k thermistor profile
sensor_pin: PA7                                          # ADC pin for chamber thermistor

######################################################################
# Extruder Body Temperature Sensor – temperature monitoring Connected to TH2
######################################################################
[temperature_sensor extruder_body]
sensor_type: ATC Semitec 104GT-2                         # 100k thermistor profile
sensor_pin: PC4                                          # ADC pin for chamber thermistor

######################################################################
# Chamber Heater – controlled heat inside enclosure
######################################################################
[heater_generic chamber_heater]
gcode_id: chamber_heater                                 # Identifier used in macros
heater_pin: PA0                                          # Heater power output pin connected to HE1
smooth_time: 10                                          # Smooth temperature feedback
sensor_type: ATC Semitec 104GT-2                         # Thermistor type
sensor_pin: PC5                                          # ADC pin for heater probe connected to TH1
pwm_cycle_time: 0.25                                     # PWM frequency for heater control
min_temp: 0                                              # Minimum allowed reading
max_temp: 100                                            # Max target temperature (safety limit!)
max_power: 1.0                                           # Allow full power output
# SAFETY: ALWAYS use independent safety devices with mains heaters!


######################################################################
# Chamber Heater Fan – air circulation for thermal stability Connected to FAN3
######################################################################
[heater_fan chamber_heater_fan]
pin: PA3                                                 # Fan control pin
heater: chamber_heater                                   # Trigger based on chamber heater temp
heater_temp: 30                                          # Fan ON at ≥ 30 °C


######################################################################
# Skew-correction – fill in after measurement
######################################################################
[skew_correction]
# xy_skew: 0.000
# xz_skew: 0.000
# yz_skew: 0.000


######################################################################
# Exclude_Object – slicer-controlled object cancellation
######################################################################
[exclude_object]
# Objects are added dynamically via EXCLUDE_OBJECT commands

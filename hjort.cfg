#    {% endif %}
#press_gcode:                                             # Optional – intentionally left blank


######################################################################
# Chamber Temperature Sensor – passive chamber monitoring
######################################################################
[temperature_sensor chamber]
sensor_type: ATC Semitec 104GT-2                         # 100k thermistor profile
sensor_pin: PF7                                          # ADC pin for chamber thermistor


######################################################################
# Chamber Heater – controlled heat inside enclosure
######################################################################
[heater_generic chamber_heater]
gcode_id: chamber_heater                                 # Identifier used by macros/G-code
heater_pin: PA3                                          # Output pin controlling chamber heater relay/MOSFET/SSR
smooth_time: 10                                          # Smooth the temperature signal for stable PID control
sensor_type: ATC Semitec 104GT-2                         # Thermistor type for heater probe
sensor_pin: PF5                                          # ADC pin for heater thermistor
pwm_cycle_time: 0.25                                     # PWM period for heater output
min_temp: 0                                              # Minimum allowed reading
max_temp: 70                                             # Maximum allowed temperature (safety limit)
max_power: 1.0                                           # Allow full power output
# SAFETY: Use proper SSR/fusing and independent thermal cutoffs for mains heaters.


######################################################################
# Chamber Heater Fan – air circulation for thermal stability
######################################################################
[heater_fan chamber_heater_fan]
pin: PD13                                                # Fan control pin
heater: chamber_heater                                   # Trigger based on chamber heater temperature
heater_temp: 30                                          # Fan ON at ≥ 30°C


######################################################################
# Skew-correction – fill in after calibration
######################################################################
[skew_correction]
# xy_skew: 0.000
# xz_skew: 0.000
# yz_skew: 0.000


######################################################################
# Exclude_Object – slicer-controlled per-object cancellation
######################################################################
[exclude_object]
# Objects are registered dynamically via EXCLUDE_OBJECT commands


######################################################################
# RatOS Machine Macros – Chamber heater specific stuff
######################################################################
[gcode_macro RatOS]
variable_chamber_heater_enable: True                      # Enable/disable chamber heater control
variable_chamber_heater_bed_temp: 90                      # Bed temperature during chamber preheating (°C)
variable_chamber_heater_preheating_temp: 75               # Generic heater temperature for chamber preheating (°C)
variable_chamber_heater_heating_temp_offset: 25           # Temperature offset for generic heater while printing (°C)
variable_chamber_heater_control_external_heater: False    # Enable automatic control for external heater devices
variable_chamber_heater_air_circulation_enable: True      # Use part cooling for air circulation during preheating
variable_chamber_heater_air_circulation_fan_speed: 0.35   # Part cooling fan speed for air circulation (0.0-1.0)
variable_chamber_heater_air_circulation_y_pos: 0          # Toolhead Y-position for air circulation
variable_chamber_heater_air_circulation_z_pos: 100        # Toolhead Z-position for air circulation
variable_chamber_heater_extra_fan_speed: 1.0              # Extra chamber heater fan speed (0.0-1.0)
variable_chamber_heater_filter_fan_speed: 1.0             # Filter fan speed for air circulation (0.0-1.0)
variable_beacon_adaptive_heat_soak: True                  # Can be set to false to disable Adaptive Heat Soak
variable_beacon_adaptive_heat_soak_layer_quality: 1
variable_beacon_adaptive_heat_soak_maximum_first_layer_duration: 1800
variable_beacon_adaptive_heat_soak_max_wait: 600
variable_hotend_heat_soak_time: 60
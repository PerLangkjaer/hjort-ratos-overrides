######################################################################
#  hjort.cfg  –  RatOS add-on
#
#  Includes:
#    • RatOS and machine-level macros
#    • Global slicer compatibility override
#    • Per-tool macros (T0 / optional T1) for filament-sensor behaviour
#    • Toolhead filament sensor + button for T0
#    • Chamber/case light (PWM controlled)
#    • Chamber filter fan, temperature sensor and heater
#    • Placeholders for skew-correction and exclude-object
######################################################################


######################################################################
# RatOS Machine Macros – feature flags consumed by RatOS flows/macros
######################################################################
#[gcode_macro RatOS]
#variable_beacon_scan_compensation_enable: True            # Enable Beacon scan compensation (bed mapping refinement)
#variable_has_front_arm_nozzle_wiper: True                 # Printer has a front-arm nozzle wiper (e.g. V-Core 4 style)
#variable_beacon_contact_start_print_true_zero: False      # If True: use Beacon contact to determine true Z=0 on final START_PRINT homing move


######################################################################
# RatOS Machine Macros – Chamber heater specific stuff
######################################################################
[gcode_macro RatOS]
variable_chamber_heater_enable: True                      # Enable/disable chamber heater control
variable_chamber_heater_bed_temp: 115                     # Bed temperature during chamber preheating (°C)
variable_chamber_heater_preheating_temp: 60               # Generic heater temperature for chamber preheating (°C)
variable_chamber_heater_heating_temp_offset: 25           # Temperature offset for generic heater while printing (°C)
variable_chamber_heater_control_external_heater: False    # Enable automatic control for external heater devices
variable_chamber_heater_air_circulation_enable: True      # Use part cooling for air circulation during preheating
variable_chamber_heater_air_circulation_fan_speed: 0.35   # Part cooling fan speed for air circulation (0.0-1.0)
variable_chamber_heater_air_circulation_y_pos: 0          # Toolhead Y-position for air circulation
variable_chamber_heater_air_circulation_z_pos: 100        # Toolhead Z-position for air circulation
variable_chamber_heater_extra_fan_speed: 1.0              # Extra chamber heater fan speed (0.0-1.0)
variable_chamber_heater_filter_fan_speed: 1.0             # Filter fan speed for air circulation (0.0-1.0)


######################################################################
# RatOS General Settings
######################################################################
[ratos]
allow_unsupported_slicer_versions: True                   # Accept slicer versions not “officially” recognised by RatOS


######################################################################
# Tool 0 (T0) – filament-sensor behaviour flags
######################################################################
[gcode_macro T0]
variable_enable_insert_detection: False                   # Ignore filament INSERT events (set True to react on insert)
variable_enable_runout_detection:  True                   # Enable filament RUNOUT detection
variable_enable_clog_detection:    True                  # Enable only if stable (can cause false triggers)
variable_unload_after_runout:      False                  # Auto-unload after runout (False = do nothing)

[stepper_z]
position_max: 1005

######################################################################
# Toolhead Filament Switch Sensor (T0) – runout/insert detection near nozzle
######################################################################
[filament_switch_sensor bowden_filament_sensor_t0]
pause_on_runout: False
event_delay: 0.1
switch_pin: ^PG15
runout_gcode:
    _ON_BOWDEN_FILAMENT_SENSOR_RUNOUT TOOLHEAD=0
insert_gcode:
    _ON_BOWDEN_FILAMENT_SENSOR_INSERT TOOLHEAD=0

######################################################################
# Toolhead Filament Sensor Button (T0) – clog/manual press action
######################################################################
[filament_motion_sensor bowden_filament_clog_t0]
switch_pin: ^PG11
detection_length: 8
extruder: extruder
pause_on_runout: False
event_delay: 3.0
pause_delay: 0.5
runout_gcode:
  _ON_BOWDEN_FILAMENT_SENSOR_CLOG TOOLHEAD=0
insert_gcode:


######################################################################
# Chamber Temperature Sensor – passive chamber monitoring
######################################################################
[temperature_sensor chamber]
sensor_type: ATC Semitec 104GT-2                         # 100k thermistor profile
sensor_pin: PF7                                          # ADC pin for chamber thermistor


######################################################################
# Chamber Heater – controlled heat inside enclosure
######################################################################
[heater_generic chamber_heater]
gcode_id: chamber_heater                                 # Identifier used by macros/G-code
heater_pin: PA3                                          # Output pin controlling chamber heater relay/MOSFET/SSR
smooth_time: 10                                          # Smooth the temperature signal for stable PID control
sensor_type: ATC Semitec 104GT-2                         # Thermistor type for heater probe
sensor_pin: PF5                                          # ADC pin for heater thermistor
pwm_cycle_time: 0.25                                     # PWM period for heater output
min_temp: 0                                              # Minimum allowed reading
max_temp: 70                                             # Maximum allowed temperature (safety limit)
max_power: 1.0                                           # Allow full power output
# SAFETY: Use proper SSR/fusing and independent thermal cutoffs for mains heaters.


######################################################################
# Chamber Heater Fan – air circulation for thermal stability
######################################################################
[heater_fan chamber_heater_fan]
pin: PD13                                                # Fan control pin
heater: chamber_heater                                   # Trigger based on chamber heater temperature
heater_temp: 30                                          # Fan ON at ≥ 30°C


######################################################################
# Firmware Retraction - this part defines the specific retraction of the extruder
######################################################################
[firmware_retraction]
retract_length: 0.8
retract_speed: 60
unretract_speed: 60


######################################################################
# Printer specific max speeds
######################################################################
[printer]
max_velocity: 600
max_accel: 10000
max_z_velocity: 35
max_z_accel: 400

[stepper_x]
homing_speed: 120
homing_retract_dist: 0

[stepper_y]
homing_speed: 120
homing_retract_dist: 0


######################################################################
# Skew-correction – fill in after calibration
######################################################################
[skew_correction]
# xy_skew: 0.000
# xz_skew: 0.000
# yz_skew: 0.000


######################################################################
# Exclude_Object – slicer-controlled per-object cancellation
######################################################################
[exclude_object]
# Objects are registered dynamically via EXCLUDE_OBJECT commands


######################################################################
# Custom END_PRINT to be able to utilize the full 1 METER build height
######################################################################
[gcode_macro _END_PRINT_AFTER_HEATERS_OFF]
gcode:
	# IDEX mode
	{% set idex_mode = '' %}
	{% if printer["dual_carriage"] is defined %}
		{% set idex_mode = printer["dual_carriage"].carriage_1|lower %}
		{% set idex_toolhead = 1 if idex_mode == 'primary' else 0 %}
	{% endif %}

	# Calculate safe Z position
	{% set max_z = printer.toolhead.axis_maximum.z|float %}
	{% set current_z = printer.toolhead.position.z|float %}
	{% set z_hop = printer["gcode_macro RatOS"].end_print_park_z_hop|float %}
	{% set max_margin = 1.0 %}
	{% set target_max_z = max_z - max_margin %}
	{% set r = printer["gcode_macro RatOS"].end_print_retract_filament|default(4)|float %}

	{% if current_z < (target_max_z - z_hop) %}
		{% set z_safe = z_hop %}
	{% else %}
		{% set z_safe = target_max_z - current_z %}
	{% endif %}
	{% if z_safe < 0 %}
		{% set z_safe = 0 %}
	{% endif %}

	# Can extruder extrude
	{% set can_extrude = true if printer['extruder'].can_extrude|lower == 'true' else false %}
	{% if idex_mode != '' %}
		{% if idex_mode == 'copy' or idex_mode == 'mirror' %}
			{% set can_extrude = true if printer['extruder'].can_extrude|lower == 'true' and printer['extruder1'].can_extrude|lower == 'true' else false %}
		{% else %}
			{% if printer.toolhead.extruder == 'extruder1' %}
				{% set can_extrude = true if printer['extruder1'].can_extrude|lower == 'true' else false %}
			{% endif %}
		{% endif %}
	{% endif %}

	# Relative positioning
	G91
	# Retract the filament a bit before lifting the nozzle.
	{% if can_extrude %}
		G1 E-2 F3600
	{% endif %}
	# Move to safe Z position
	G0 Z{z_safe} F3600
	# Retract filament even more
	{% if can_extrude %}
		G1 E-{(r-2)} F3600
	{% endif %}
	# Back to absolute positioning
	G90
